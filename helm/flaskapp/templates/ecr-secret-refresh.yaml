{{- if .Values.ecrSecretRefresh.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.ecrSecretRefresh.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-ecr-secret-refresher
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-ecr-secret-refresher
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.ecrSecretRefresh.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-ecr-secret-refresher
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-ecr-secret-refresh
  namespace: {{ .Release.Namespace }}
spec:
  schedule: {{ .Values.ecrSecretRefresh.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.ecrSecretRefresh.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.ecrSecretRefresh.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.ecrSecretRefresh.backoffLimit }}
      template:
        spec:
          serviceAccountName: {{ .Values.ecrSecretRefresh.serviceAccountName }}
          restartPolicy: OnFailure
          containers:
            - name: refresh-ecr-secret
              image: "{{ .Values.ecrSecretRefresh.image.repository }}:{{ .Values.ecrSecretRefresh.image.tag }}"
              imagePullPolicy: {{ .Values.ecrSecretRefresh.image.pullPolicy }}
              envFrom:
                - secretRef:
                    name: {{ .Values.ecrSecretRefresh.awsCredentialsSecretName }}
              env:
                - name: AWS_DEFAULT_REGION
                  value: {{ .Values.ecrSecretRefresh.region | quote }}
                - name: AWS_REGION
                  value: {{ .Values.ecrSecretRefresh.region | quote }}
                - name: ECR_REGISTRY
                  value: {{ .Values.ecrSecretRefresh.registry | quote }}
                - name: ECR_SECRET_NAME
                  value: {{ .Values.ecrSecretRefresh.secretName | quote }}
                - name: TARGET_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              command:
                - /bin/sh
                - -ec
              args:
                - |
                  : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}"
                  : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}"

                  ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_DEFAULT_REGION")"
                  kubectl -n "$TARGET_NAMESPACE" create secret docker-registry "$ECR_SECRET_NAME" \
                    --docker-server="$ECR_REGISTRY" \
                    --docker-username=AWS \
                    --docker-password="$ECR_PASSWORD" \
                    --dry-run=client \
                    -o yaml | kubectl apply --server-side --field-manager=ecr-secret-refresher -f -

                  kubectl -n "$TARGET_NAMESPACE" annotate secret "$ECR_SECRET_NAME" \
                    ecr-refresh.kosa/last-refresh="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --overwrite
{{- end }}
