replicaCount: 2

image:
  repository: 080252689380.dkr.ecr.ap-northeast-2.amazonaws.com/flaskapp
  tag: "d457c7e"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-regcred

ecrSecretRefresh:
  enabled: true
  secretName: ecr-regcred
  registry: 080252689380.dkr.ecr.ap-northeast-2.amazonaws.com
  region: ap-northeast-2
  schedule: "0 */6 * * *"
  awsCredentialsSecretName: ecr-refresh-aws-credentials
  serviceAccountName: ecr-secret-refresher
  image:
    repository: alpine/k8s
    tag: "1.30.1"
    pullPolicy: IfNotPresent
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  backoffLimit: 1

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: flaskapp.onprem.local

config:
  DATABASE_HOST: "172.16.43.160"
  DATABASE_USER: "flaskapp"
  DATABASE_DB_NAME: "flaskapp"
  AWS_DEFAULT_REGION: "ap-northeast-2"
  PHOTOS_BUCKET: "flaskapp-proddata-kosa-project-team3-snow-lai9z"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"
