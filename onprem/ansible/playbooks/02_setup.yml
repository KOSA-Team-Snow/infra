---
- name: Setup Kubernetes node prerequisites
  hosts: k8s
  become: true
  gather_facts: true

  handlers:
    - name: Apply sysctl
      ansible.builtin.command: sysctl --system

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true

    - name: Restart kubelet
      ansible.builtin.systemd:
        name: kubelet
        state: restarted
        enabled: true

  tasks:
    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: true
        lock_timeout: 300
      register: common_apt_result
      retries: 5
      delay: 10
      until: common_apt_result is succeeded

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Persist Kubernetes kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          {% for module in k8s_kernel_modules %}
          {{ module }}
          {% endfor %}

    - name: Load Kubernetes kernel modules
      ansible.builtin.command: "modprobe {{ item }}"
      changed_when: false
      loop: "{{ k8s_kernel_modules }}"

    - name: Persist Kubernetes sysctl settings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          {% for key, value in k8s_sysctl.items() %}
          {{ key }} = {{ value }}
          {% endfor %}
      notify: Apply sysctl

    - name: Validate Kubernetes node address on default interface
      ansible.builtin.command:
        cmd: "ip -4 addr show dev {{ ansible_facts['default_ipv4']['interface'] }}"
      register: node_interface_addresses
      changed_when: false
      failed_when: ansible_host not in node_interface_addresses.stdout

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Generate default containerd config
      ansible.builtin.command: containerd config default
      register: containerd_default_config
      changed_when: false

    - name: Configure containerd systemd cgroup driver
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        owner: root
        group: root
        mode: "0644"
        content: "{{ containerd_default_config.stdout | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true') }}\n"
      notify: Restart containerd

    - name: Enable containerd and qemu guest agent
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - containerd
        - qemu-guest-agent

    - name: Install crictl config
      ansible.builtin.copy:
        dest: /etc/crictl.yaml
        owner: root
        group: root
        mode: "0644"
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 10
          debug: false

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Kubernetes apt key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_repo_version }}/deb/Release.key"
        dest: /tmp/kubernetes-release.key
        mode: "0644"

    - name: Convert Kubernetes apt key
      ansible.builtin.command:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/kubernetes-release.key
      changed_when: false

    - name: Configure Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_repo_version }}/deb/ /

    - name: Install kubelet, kubeadm, and kubectl
      ansible.builtin.apt:
        name: "{{ kubernetes_packages }}"
        state: present
        update_cache: true
        lock_timeout: 300
      register: kubernetes_apt_result
      retries: 5
      delay: 10
      until: kubernetes_apt_result is succeeded

    - name: Configure kubelet node IP
      ansible.builtin.copy:
        dest: /etc/default/kubelet
        owner: root
        group: root
        mode: "0644"
        content: |
          KUBELET_EXTRA_ARGS=--node-ip={{ ansible_host }}
      notify: Restart kubelet

    - name: Hold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
