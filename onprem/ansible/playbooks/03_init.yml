---
- name: Initialize first Kubernetes control plane
  hosts: k8s-cp-1
  become: true
  gather_facts: true

  vars:
    bootstrap_vip_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"

  tasks:
    - name: Add temporary bootstrap VIP on k8s-cp-1
      ansible.builtin.command:
        cmd: "ip addr add {{ kubernetes_api_vip }}/32 dev {{ bootstrap_vip_interface }}"
      register: bootstrap_vip_add
      failed_when:
        - bootstrap_vip_add.rc != 0
        - "'File exists' not in bootstrap_vip_add.stderr"
        - "'Address already assigned' not in bootstrap_vip_add.stderr"
      changed_when: bootstrap_vip_add.rc == 0

    - name: Build API server certificate SANs
      ansible.builtin.set_fact:
        apiserver_cert_extra_sans: "{{ ([kubernetes_api_vip] + groups['control_plane'] + (groups['control_plane'] | map('extract', hostvars, 'ansible_host') | list)) | unique }}"

    - name: Initialize Kubernetes cluster
      ansible.builtin.command:
        cmd: >-
          kubeadm init
          --control-plane-endpoint {{ kubernetes_api_vip }}:{{ kubernetes_api_port }}
          --apiserver-advertise-address {{ ansible_host }}
          --apiserver-cert-extra-sans {{ apiserver_cert_extra_sans | join(',') }}
          --upload-certs
          --pod-network-cidr {{ kubernetes_pod_cidr }}
          --service-cidr {{ kubernetes_service_cidr }}
          --kubernetes-version {{ kubernetes_cluster_version }}
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubeadm_init

    - name: Create kubeconfig directory for ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Copy admin kubeconfig for ansible user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
        remote_src: true

    - name: Wait for Kubernetes API server on node IP
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig=/etc/kubernetes/super-admin.conf --server=https://{{ ansible_host }}:{{ kubernetes_api_port }} --request-timeout=10s get --raw=/readyz"
      register: api_ready_on_node_ip
      retries: 30
      delay: 10
      until: api_ready_on_node_ip.rc == 0
      changed_when: false

    - name: Show kubeadm init output
      ansible.builtin.debug:
        var: kubeadm_init.stdout_lines
      when: kubeadm_init.changed
