---
- name: Hand off Kubernetes API VIP from temporary address to kube-vip
  hosts: k8s-cp-1
  become: true
  gather_facts: true

  vars:
    kube_vip_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
    kube_vip_kubeconfig: /etc/kubernetes/super-admin.conf

  tasks:
    - name: Ensure Kubernetes static pod manifest directory exists
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install kube-vip static pod manifest on k8s-cp-1
      ansible.builtin.copy:
        dest: /etc/kubernetes/manifests/kube-vip.yaml
        owner: root
        group: root
        mode: "0644"
        content: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: kube-vip
            namespace: kube-system
          spec:
            containers:
              - name: kube-vip
                image: ghcr.io/kube-vip/kube-vip:{{ kube_vip_version }}
                imagePullPolicy: IfNotPresent
                args:
                  - manager
                  - --k8sConfigPath={{ kube_vip_kubeconfig }}
                env:
                  - name: vip_arp
                    value: "true"
                  - name: port
                    value: "{{ kubernetes_api_port | string }}"
                  - name: vip_interface
                    value: "{{ kube_vip_interface }}"
                  - name: vip_subnet
                    value: "/32"
                  - name: cp_enable
                    value: "true"
                  - name: cp_namespace
                    value: kube-system
                  - name: svc_enable
                    value: "false"
                  - name: vip_leaderelection
                    value: "true"
                  - name: vip_leaseduration
                    value: "15"
                  - name: vip_renewdeadline
                    value: "10"
                  - name: vip_retryperiod
                    value: "2"
                  - name: address
                    value: "{{ kubernetes_api_vip }}"
                securityContext:
                  capabilities:
                    add:
                      - NET_ADMIN
                      - NET_RAW
                      - SYS_TIME
                volumeMounts:
                  - mountPath: "{{ kube_vip_kubeconfig }}"
                    name: kubeconfig
                    readOnly: true
            hostAliases:
              - ip: 127.0.0.1
                hostnames:
                  - kubernetes
            hostNetwork: true
            volumes:
              - name: kubeconfig
                hostPath:
                  path: {{ kube_vip_kubeconfig }}
                  type: File

    - name: Restart kubelet to refresh static pod manifests
      ansible.builtin.systemd:
        name: kubelet
        state: restarted
        enabled: true

    - name: Recreate kube-vip static pod container
      ansible.builtin.shell: |
        crictl ps -a --name kube-vip -q | xargs -r crictl stop || true
        crictl ps -a --name kube-vip -q | xargs -r crictl rm || true
      changed_when: true

    - name: Wait for kube-vip container to be running
      ansible.builtin.shell: "crictl ps --name kube-vip -q"
      register: kube_vip_running
      retries: 20
      delay: 3
      until: kube_vip_running.stdout | length > 0
      changed_when: false

    - name: Wait for Kubernetes API server through VIP
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig=/etc/kubernetes/super-admin.conf --server=https://{{ kubernetes_api_vip }}:{{ kubernetes_api_port }} --request-timeout=10s get --raw=/readyz"
      register: api_ready_on_vip
      retries: 30
      delay: 5
      until: api_ready_on_vip.rc == 0
      changed_when: false

    - name: Remove temporary bootstrap VIP after kube-vip is running
      ansible.builtin.command:
        cmd: "ip addr del {{ kubernetes_api_vip }}/32 dev {{ kube_vip_interface }}"
      register: bootstrap_vip_remove
      failed_when:
        - bootstrap_vip_remove.rc != 0
        - "'Cannot assign requested address' not in bootstrap_vip_remove.stderr"
        - "'Address not found' not in bootstrap_vip_remove.stderr"
      changed_when: bootstrap_vip_remove.rc == 0

    - name: Verify Kubernetes API server through VIP after bootstrap VIP removal
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig=/etc/kubernetes/super-admin.conf --server=https://{{ kubernetes_api_vip }}:{{ kubernetes_api_port }} --request-timeout=10s get --raw=/readyz"
      register: api_ready_after_vip_cleanup
      retries: 30
      delay: 5
      until: api_ready_after_vip_cleanup.rc == 0
      changed_when: false
