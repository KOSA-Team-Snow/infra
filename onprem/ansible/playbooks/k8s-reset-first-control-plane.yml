---
- name: Reset failed kubeadm init on first control plane
  hosts: k8s-cp-1
  become: true
  gather_facts: false

  tasks:
    - name: Reset kubeadm state
      ansible.builtin.command: kubeadm reset -f
      changed_when: true

    - name: Remove partial Kubernetes control plane files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/etcd
        - /var/lib/kubelet/pki

    - name: Restart kubelet
      ansible.builtin.systemd:
        name: kubelet
        state: restarted
        enabled: true

